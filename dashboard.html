<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Citanext</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Librería QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>

  <!-- Barra superior con efecto glass -->
  <nav class="topbar">
    <div class="nav-logo">
      <i class="fa-regular fa-calendar-check"></i>
      <span>Citanext</span>
    </div>
    <div class="topbar-actions">
      <a href="calendar.html" class="btn-glass">📆 Calendario</a>
      <button id="btn-logout" class="btn-glass">Cerrar sesión</button>
    </div>
  </nav>

  <div class="dashboard-container">

    <!-- Pestañas -->
    <div class="tabs">
      <button class="tab active" data-tab="perfil"><i class="fa-solid fa-user"></i> Perfil</button>
      <button class="tab" data-tab="servicios"><i class="fa-solid fa-list-check"></i> Servicios</button>
      <button class="tab" data-tab="empleados"><i class="fa-solid fa-people-group"></i> Empleados</button>
      <button class="tab" data-tab="citas"><i class="fa-regular fa-calendar"></i> Citas</button>
      <button class="tab" data-tab="enlaces"><i class="fa-solid fa-link"></i> Enlaces</button>
    </div>

    <!-- ========== PERFIL ========== -->
    <section id="tab-perfil" class="tab-content active">
      <!-- igual que antes -->
      <!-- ... (código del perfil) ... -->
    </section>

    <!-- ========== SERVICIOS + HORARIOS ========== -->
    <section id="tab-servicios" class="tab-content">
      <h2>Tus servicios</h2>
      <form id="form-servicio" class="inline-form">
        <input type="text" id="servicio-nombre" placeholder="Nombre del servicio" required>
        <input type="number" id="servicio-duracion" placeholder="Minutos" required>
        <input type="number" id="servicio-precio" placeholder="Precio" required>
        <input type="color" id="servicio-color" value="#667eea">
        <button type="submit" class="btn-primary">Agregar</button>
      </form>
      <ul id="lista-servicios" class="item-list"></ul>

      <!-- NUEVO: Horario de trabajo -->
      <h2>📅 Horario de trabajo</h2>
      <p>Define tu jornada laboral por día de la semana.</p>
      <form id="form-horario">
        <div id="dias-horario" class="horario-grid">
          <!-- Se generarán con JavaScript -->
        </div>
        <button type="submit" class="btn-primary">Guardar horarios</button>
      </form>
    </section>

    <!-- ========== EMPLEADOS ========== -->
    <section id="tab-empleados" class="tab-content">
      <!-- igual que antes -->
    </section>

    <!-- ========== CITAS (NUEVO CALENDARIO) ========== -->
    <section id="tab-citas" class="tab-content">
      <h2>📊 Calendario de disponibilidad</h2>
      <div id="calendario-citas"></div>
      <p class="leyenda"><span class="dot verde"></span> Disponible <span class="dot amarillo"></span> Medio <span class="dot rojo"></span> Lleno <span class="dot gris"></span> Sin laborar</p>
    </section>

    <!-- ========== ENLACES ========== -->
    <section id="tab-enlaces" class="tab-content">
      <!-- igual -->
    </section>

  </div>

  <!-- MODAL para ver/editar citas del día -->
  <div id="modal-citas-dia" class="modal hidden">
    <div class="modal-content glass-card">
      <span class="close">&times;</span>
      <h3 id="fecha-seleccionada">Citas del día</h3>
      <div id="lista-citas-dia"></div>
    </div>
  </div>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
