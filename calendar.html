<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario – Citanext</title>

  <!-- ====== PWA ====== -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">

  <!-- ====== iOS PWA ====== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Citanext">
  <link rel="apple-touch-icon" href="img/icon-192.png">

  <!-- ====== ESTILOS ====== -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/calendar.css">
</head>
<body>

  <!-- Barra superior con logo y nombre dinámicos -->
  <nav class="topbar">
    <div class="nav-logo" id="nav-logo">
      <img id="topbar-logo" src="" alt="Logo" class="topbar-logo-img">
      <span id="topbar-nombre">Citanext</span>
    </div>
    <div class="topbar-actions">
      <a href="dashboard.html" class="btn-secondary">⬅ Dashboard</a>
      <button id="btn-logout" class="btn-secondary">Cerrar sesión</button>
    </div>
  </nav>

  <div class="calendar-wrapper">
    <div id="calendar"></div>
  </div>

  <!-- Modal para crear/editar cita (CORREGIDO) -->
  <div id="modal-cita" class="modal hidden">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modal-titulo">Nueva cita</h2>
      <form id="form-cita">
        <div class="input-group">
          <label>Cliente</label>
          <input type="text" id="cita-cliente" placeholder="Nombre del cliente" required>
        </div>
        <div class="input-group">
          <label>Teléfono</label>
          <input type="tel" id="cita-telefono" placeholder="521234567890" required>
        </div>
        <div class="input-group">
          <label>Email (opcional)</label>
          <input type="email" id="cita-email" placeholder="correo@cliente.com">
        </div>
        <div class="input-group">
          <label>Servicio</label>
          <select id="cita-servicio" required></select>
        </div>
        <div class="input-group">
          <label>Empleado (opcional)</label>
          <select id="cita-empleado"></select>
        </div>
        <!-- ====== NUEVO: Selector de fecha y slots horarios ====== -->
        <div class="input-group">
          <label>Fecha</label>
          <input type="date" id="cita-fecha-input" required>
        </div>
        <div class="input-group">
          <label>Horario disponible</label>
          <div id="slots-cita" class="slots">– Primero selecciona una fecha –</div>
          <span id="slot-seleccionado-texto" style="font-size:0.85rem; color:#4f46e5; display:none;"></span>
        </div>
        <!-- ====== FIN NUEVO ====== -->
        <button type="submit" class="btn-primary">Guardar cita</button>
        <button type="button" id="btn-eliminar-cita" class="btn-danger hidden">Eliminar cita</button>
      </form>
    </div>
  </div>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script type="module" src="js/calendar.js"></script>

  <!-- ====== REGISTRO DEL SERVICE WORKER ====== -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then((registration) => console.log('SW registrado en calendar:', registration.scope))
          .catch((error) => console.log('Error al registrar SW:', error));
      });
    }
  </script>
</body>
</html>
